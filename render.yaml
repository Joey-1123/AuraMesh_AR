services:
  - type: web
    name: auramesh-django
    runtime: docker
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - fromGroup: auramesh-secrets

envVarGroups:
  - name: auramesh-secrets
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: SESSION_TOKEN_SECRET
        generateValue: true
      - key: INTERNAL_EVENT_TOKEN
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"

